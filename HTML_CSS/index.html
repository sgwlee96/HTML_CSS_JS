<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>Execrcise Text</title>
    </head>
    <body>
        <!-- 
            0. 검색엔진 최적화의 이유 등으로. (h1 부터 검색엔진에서 중요도가 낮아짐 )
            1. h1 태그는 하나의 html 문서에서 한번만 사용.
            2. h(n) 태그는 h1 태그부터 순차적으로 사용해야한다.  
        -->
        <p>test</p> 
        <h1>h1 tag</h1>
        <h2>h2 tag</h2>
        <h3>h3 tag</h3>
        <h4>h4 tag</h4>
        <h5>h5 tag</h5>
        <h6>h6 tag</h6>
        
        <p>
        <>코딩은 누구나 쉽게 배울 수 있는<br>
        코딩 교육 채널입니다.
        </p>

        <img src=".\Images\maxresdefault.jpg" alt="Two maids" width="550" height="">
        <a href="https://google.com" target="_blank">
            <img src="https://www.google.co.kr/logos/doodles/2021/seasonal-holidays-2021-6753651837109324-6752733080595603-cst.gif" 
            alt="Google">
        </a>
        

        <!-- 내부링크(보통 위키에서 목차에 사용) -->
        <a href="#one">One으로 이동</a>
        <a href="#two">여기를 눌러보세요</a>

        <p id="one" style="margin-top: 800px;">one</p>
        <p id="two" style="margin-top: 800px;">
            <img src=".\Images\maxresdefault.jpg" alt="Two maids" width="550" height="">
        </p>
        <p style="margin-top: 800px;"></p>


        <!-- 외부 링크 -->
        <a href="https://google.com" target="_blank">구글로 이동</a>
    </body>
</html>
