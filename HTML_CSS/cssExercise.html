<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
        <title>CSS(Cascading Style Sheet)</title>
        <!-- 내부 스타일 시트 방법 (Internal Style sheet)
        <style>
            p{color: blue;}
        </style> -->

        <!-- 외부 스타일 시트 방법(External Style Sheet) -->
        <link href="ExternalCSS_Exercise.css" rel="stylesheet">
    </head>

    <body>
        <p>이것은 외부 스타일 CSS를 사용한 문장입니다.</p>

        <!-- Inline sytle sheet -->
        <p style="color: chartreuse;">이것은 인라인 스타일 CSS를 사용한 문장입니다.</p>
    </body>
</html>
